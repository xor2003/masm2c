name: C/C++ CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y make gcc gcc-multilib g++-multilib libncurses-dev
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run asm tests
        run: make ci-asmtests
      - name: Run qemu tests
        run: make ci-qemu-tests
