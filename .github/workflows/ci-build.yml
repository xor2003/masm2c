name: ci-build

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  lint-type-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y make gcc gcc-multilib g++-multilib libncurses-dev
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy
      - name: Ruff
        run: ruff check masm2c tests
      - name: Mypy
        run: mypy masm2c
      - name: Pytest
        run: pytest -q

  integration-scripts:
    runs-on: ubuntu-22.04
    needs: lint-type-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run project scripts
        run: |
          bash ./install-test.sh
          bash ./runtests.sh
          bash ./_binarytests.sh
